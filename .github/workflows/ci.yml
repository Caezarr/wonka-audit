name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Tests
        run: npm test
      - name: Package inspection
        run: npm run pack:check
      - name: Metadata-only smoke
        run: node src/cli.js --metadata-only --since 1990-01-01 --until 1990-01-02 --out .tmp/smoke
      - name: Privacy assertion
        run: node -e "const a=require('./.tmp/smoke/wonka-ai-audit-report.json'); if(a.privacy.local_content_inspection!==false||a.score.ai_practice_score!==0) process.exit(1)"
